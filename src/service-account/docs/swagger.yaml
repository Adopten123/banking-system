basePath: /
definitions:
  github_com_Adopten123_banking-system_service-account_internal_domain.Account:
    properties:
      createdAt:
        type: string
      currencyCode:
        type: string
      id:
        format: int64
        type: integer
      name:
        type: string
      publicID:
        type: string
      statusID:
        format: int32
        type: integer
      typeID:
        format: int32
        type: integer
      updatedAt:
        type: string
      userID:
        type: string
      version:
        format: int32
        type: integer
    type: object
  github_com_Adopten123_banking-system_service-account_internal_domain.AccountBalanceResponse:
    properties:
      account_id:
        type: string
      balance:
        type: number
    type: object
  github_com_Adopten123_banking-system_service-account_internal_domain.TransactionHistory:
    properties:
      amount:
        type: string
      category_id:
        type: integer
      created_at:
        type: string
      currency_code:
        type: string
      description:
        type: string
      status_id:
        type: integer
      transaction_id:
        type: string
    type: object
  github_com_Adopten123_banking-system_service-account_internal_domain.WithdrawRequest:
    properties:
      amount:
        type: string
    type: object
  github_com_Adopten123_banking-system_service-account_internal_domain.WithdrawResponse:
    properties:
      currency:
        type: string
      new_balance:
        type: number
      transaction_id:
        type: string
    type: object
  internal_handler_http.CreateAccountRequest:
    properties:
      currency_code:
        type: string
      name:
        type: string
      type_id:
        type: integer
      user_id:
        type: string
    type: object
  internal_handler_http.DepositRequest:
    properties:
      amount:
        type: string
    type: object
  internal_handler_http.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
  internal_handler_http.TransferRequest:
    properties:
      amount:
        type: string
      currency_code:
        type: string
      description:
        type: string
      to_account_id:
        type: string
    type: object
  internal_handler_http.UpdateCreditLimitRequest:
    properties:
      credit_limit:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: Микросервис для управления счетами и балансами.
  title: Banking System - Account Service API
  version: "1.0"
paths:
  /api/accounts:
    post:
      consumes:
      - application/json
      description: Создает новый банковский счет для пользователя с нулевым балансом
      parameters:
      - description: Данные для создания счета
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_http.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Счет успешно создан
          schema:
            $ref: '#/definitions/github_com_Adopten123_banking-system_service-account_internal_domain.Account'
        "400":
          description: Неверный запрос (ошибка валидации)
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Создание нового счета
      tags:
      - accounts
  /api/accounts/{id}:
    get:
      description: Возвращает текущий баланс, валюту и статус счета по его публичному
        ID
      parameters:
      - description: Public ID счета (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Информация о счете
          schema:
            $ref: '#/definitions/github_com_Adopten123_banking-system_service-account_internal_domain.Account'
        "400":
          description: Неверный формат ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Счет не найден
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получение информации о счете
      tags:
      - accounts
  /api/accounts/{id}/balance:
    get:
      description: Возвращает текущий баланс счета по его публичному UUID
      parameters:
      - description: ID счета (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Успешное получение баланса
          schema:
            $ref: '#/definitions/github_com_Adopten123_banking-system_service-account_internal_domain.AccountBalanceResponse'
        "400":
          description: Неверный формат ID (INVALID_REQUEST)
          schema:
            $ref: '#/definitions/internal_handler_http.ErrorResponse'
        "404":
          description: Счет не найден (NOT_FOUND)
          schema:
            $ref: '#/definitions/internal_handler_http.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера (INTERNAL_ERROR)
          schema:
            $ref: '#/definitions/internal_handler_http.ErrorResponse'
      summary: Получить баланс счета
      tags:
      - accounts
  /api/accounts/{id}/block:
    post:
      description: Переводит счет в статус "blocked" (3)
      parameters:
      - description: Public ID счета
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Счет заблокирован
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Неверный формат ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Счет не найден
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Блокировать счет
      tags:
      - accounts
  /api/accounts/{id}/close:
    post:
      description: Переводит счет в статус "closed" (4). Требует строго нулевого баланса!
      parameters:
      - description: Public ID счета
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Счет закрыт
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Неверный ID или ненулевой баланс
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Счет не найден
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Закрыть счет
      tags:
      - accounts
  /api/accounts/{id}/credit-limit:
    put:
      consumes:
      - application/json
      description: Позволяет задать сумму овердрафта для счета (чтобы баланс мог уходить
        в минус)
      parameters:
      - description: Public ID счета
        in: path
        name: id
        required: true
        type: string
      - description: Данные для обновления
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_http.UpdateCreditLimitRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Лимит обновлен
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Неверный запрос
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Счет не найден
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Установить кредитный лимит
      tags:
      - accounts
  /api/accounts/{id}/deposit:
    post:
      consumes:
      - application/json
      description: Зачисляет средства на указанный счет. Требует передачи Idempotency-Key
        в заголовках.
      parameters:
      - description: Public ID счета (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Уникальный ключ запроса
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Сумма пополнения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_http.DepositRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешное пополнение
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Неверный запрос
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Счет не найден
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Пополнение счета
      tags:
      - transactions
  /api/accounts/{id}/transactions:
    get:
      description: Возвращает список транзакций по счету с поддержкой пагинации
      parameters:
      - description: Public ID счета
        in: path
        name: id
        required: true
        type: string
      - description: Количество записей (по умолчанию 20)
        in: query
        name: limit
        type: integer
      - description: Смещение (по умолчанию 0)
        in: query
        name: offset
        type: integer
      - description: 'Начальная дата (RFC3339, например: 2026-02-01T00:00:00Z)'
        in: query
        name: start_date
        type: string
      - description: Конечная дата (RFC3339)
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_Adopten123_banking-system_service-account_internal_domain.TransactionHistory'
            type: array
        "400":
          description: Неверный запрос
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Счет не найден
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка сервера
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить историю транзакций
      tags:
      - transactions
  /api/accounts/{id}/transfer:
    post:
      consumes:
      - application/json
      description: Осуществляет безопасный перевод денег между двумя счетами
      parameters:
      - description: Public ID счета отправителя (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Уникальный ключ запроса
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Данные для перевода
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_handler_http.TransferRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешный перевод
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Неверный запрос
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Счет не найден
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Внутренняя ошибка
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Перевод средств
      tags:
      - transactions
  /api/accounts/{id}/withdraw:
    post:
      consumes:
      - application/json
      description: Списывает указанную сумму со счета. Учитывает кредитный лимит.
      parameters:
      - description: ID счета (UUID)
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Ключ идемпотентности (UUID)
        in: header
        name: Idempotency-Key
        required: true
        type: string
      - description: Сумма для снятия
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/github_com_Adopten123_banking-system_service-account_internal_domain.WithdrawRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Успешное снятие (возвращает чек)
          schema:
            $ref: '#/definitions/github_com_Adopten123_banking-system_service-account_internal_domain.WithdrawResponse'
        "400":
          description: Неверный запрос, нехватка средств или счет неактивен
          schema:
            $ref: '#/definitions/internal_handler_http.ErrorResponse'
        "404":
          description: Счет не найден
          schema:
            $ref: '#/definitions/internal_handler_http.ErrorResponse'
        "500":
          description: Внутренняя ошибка сервера
          schema:
            $ref: '#/definitions/internal_handler_http.ErrorResponse'
      summary: Снятие наличных
      tags:
      - transactions
swagger: "2.0"
